# ==========================================
# APPLICATION
# ==========================================
server.port=8090
spring.application.name=chat-service
spring.cloud.config.enabled=false

# ==========================================
# DATABASE (separate DB per service pattern)
# ==========================================
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/skill_chat?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================
# REDIS
# ==========================================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# ==========================================
# RABBITMQ (STOMP RELAY)
# ==========================================
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ==========================================
# EUREKA DISCOVERY
# ==========================================
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://eureka-server:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ==========================================
# LOGGING
# ==========================================
logging.level.root=INFO
logging.level.com.skillsync.chat=DEBUG
logging.file.name=logs/chat-service.log

# ==========================================
# AZURE BLOB STORAGE
# ==========================================
azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING:}
azure.storage.container-name=${AZURE_STORAGE_CONTAINER_NAME:chat-media}

# ==========================================
# FILE UPLOAD LIMITS
# ==========================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# ==========================================
# SPRINGDOC / OPENAPI / SWAGGER
# ==========================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.use-root-path=true
springdoc.show-actuator=false
springdoc.enable-spring-security-support=true
springdoc.swagger-ui.display-request-duration=true
springdoc.scan-packages=com.skillsync.chat.controller
springdoc.webjars.prefix=/webjars
springdoc.cache.disabled=false

# ==========================================
# SWAGGER SERVER URL
# ==========================================
api.gateway.url=${API_GATEWAY_URL:http://localhost:9090/api}

# ==========================================
# ZIPKIN DISTRIBUTED TRACING
# ==========================================
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.endpoints.web.exposure.include=health,prometheus,metrics,tracing
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
logging.level.io.micrometer.tracing=DEBUG
logging.level.brave=DEBUG

# ==========================================
# JWT (for WebSocket auth validation)
# ==========================================
jwt.secret=${JWT_SECRET:skildsyncSecretKey123456789012345678901234567890123456789}
